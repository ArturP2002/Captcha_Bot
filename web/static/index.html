<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Капча и билет</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/app/styles.css">
</head>
<body>
  <main class="app">
    <img class="bg-logo" src="/static/media/Logo.PNG" alt="Логотип">

    <section id="captcha-screen" class="screen">
      <h1>Соберите картинку</h1>
      <p class="hint">Перетащите шапку в подсвеченную зону «Сюда».</p>

      <div id="captcha-stage" class="captcha-stage">
        <img id="captcha-bg" class="captcha-bg" src="/static/media/base.png" alt="Капча">
        <div id="hat-target" class="hat-target">
          <span class="hat-target-label">Сюда</span>
        </div>
        <img id="hat-piece" class="hat-piece" src="/static/media/hat.png" alt="Шапка">
      </div>

      <button id="verify-btn" class="btn" type="button">Проверить</button>
      <p id="status" class="status"></p>
    </section>

    <section id="ticket-screen" class="screen hidden">
      <h1>Ваш билет</h1>
      <p id="ticket-status" class="hint">Отправляем билет в чат...</p>
      <img class="ticket-image" src="/static/media/Ticket.PNG" alt="Билет">
    </section>
  </main>

  <script src="/static/app/app.js"></script>
</body>
</html>
