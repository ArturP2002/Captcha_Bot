<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Капча и билет</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/app/styles.css?v=2">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <img class="app-logo" src="/static/media/Logo.PNG" alt="Логотип">
    </header>

    <section id="captcha-screen" class="screen">
      <h1>Только живые</h1>
      <p class="hint">Пройди капчу - получи билет. Увидимся в левеле!</p>

      <div id="captcha-stage" class="captcha-stage">
        <div class="captcha-stage-inner">
          <img id="captcha-bg" class="captcha-bg" src="/static/media/base.png" alt="Капча">
          <img id="hat-piece" class="hat-piece" src="/static/media/hat.png" alt="Кандибобер">
        </div>
      </div>

      <button id="verify-btn" class="btn" type="button">Проверить</button>
      <p id="status" class="status"></p>
    </section>

    <section id="ticket-screen" class="screen hidden">
      <h1>Твой билет</h1>
      <p class="hint">Сделай скриншот</p>
      <img class="ticket-image" src="/static/media/Ticket.PNG" alt="Билет">
    </section>
  </main>

  <script src="/static/app/app.js?v=2"></script>
</body>
</html>
